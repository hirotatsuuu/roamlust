# ==============================================================================
# アプリの基本情報設定エリア
# ==============================================================================
name: roamlust  # 【アプリの識別名】プロジェクトのフォルダ名と同じ小文字の名前（半角スペースや大文字は不可）
description: "世界の国々を探索し、旅への欲求（Roamlust）をかきたてる世界情報アプリ。"  # 【アプリの説明】

# 公開設定（'none' にすることで、このアプリのコードをインターネット上の公開ライブラリに誤って投稿するのを防ぎます）
publish_to: 'none'

# 【アプリのバージョン】「アプリのバージョン + ビルド番号」の構成。アップデート時にここを増やします
version: 1.0.0+1

# ==============================================================================
# 動作環境（Flutter/Dartのバージョン）制限エリア
# ==============================================================================
environment:
  # Dart言語のバージョンが 3.0.0 以上、4.0.0 未満の環境で動作することを保証します
  sdk: '>=3.0.0 <4.0.0'

# ==============================================================================
# 外部パッケージ（ライブラリ）の登録エリア
# ==============================================================================
dependencies:
  flutter:
    sdk: flutter  # Flutterフレームワーク本体の標準機能を使用するための記述

  # アプリ内で追加利用する便利な外部パッケージたち（^は指定以上の互換性あるバージョンを自動選択する意味）
  flutter_svg: ^2.0.10      # 【SVG画像表示】国旗やロゴなどのベクター画像を表示するために必要
  http: ^1.6.0              # 【通信】インターネット上のWeb APIなどからデータを取得するために必要
  intl: ^0.20.2             # 【多言語・フォーマット】日付や金額、数字の桁区切り（カンマ）を行うために必要
  shared_preferences: ^2.5.5 # 【ローカル保存】スマホ端末内に「お気に入り」や「キャッシュ完了状態」のデータを保存するために必要
  url_launcher: ^6.3.2      # 【外部リンク】アプリ内からスマホのブラウザ（SafariやChrome）を開くために必要
  google_fonts: ^6.2.1      # 【フォント】Googleが提供するおしゃれなフォントをアプリに適用するために必要

# ==============================================================================
# 開発中のみ使用するパッケージ（アプリの完成品には含まれないツール）の登録エリア
# ==============================================================================
dev_dependencies:
  flutter_lints: ^6.0.0        # 【コード添削】きれいでバグの少ないDartコードを書くための注意書き（警告）を出してくれるルール集
  flutter_launcher_icons: ^0.13.1 # 【アプリアイコン自動生成】1枚の画像から各OS用のアプリアイコンを全自動作成するツール

# ==============================================================================
# アプリアイコン自動生成ツールの詳細設定エリア（dart run flutter_launcher_icons で実行）
# ==============================================================================
flutter_launcher_icons:
  android: "launcher_icon"     # Android用アイコンを作成する（名前は標準の launcher_icon にする）
  ios: true                     # iOS（iPhone）用アイコンを作成する
  image_path: "assets/icon.png" # 大元となる特大アプリアイコン画像（1024x1024）の置き場所を指定
  min_sdk_size: 21              # Androidの古いバージョンでのアイコン表示崩れを防ぐための安全設定
  web:
    generate: true              # Webサイト（PWA）用のアイコンやファビコン（favicon）も同時に作成する
    image_path: "assets/icon.png" # Web用に使用する大元画像（通常はスマホ用と同じでOK）

# ==============================================================================
# Flutterシステム全体に関わるデザインや画像アセットの設定エリア
# ==============================================================================
flutter:
  uses-material-design: true  # Googleの標準デザイン「Material Design」の綺麗なアイコンや部品を使用可能にする設定

  # 【アセット（画像やJSONデータ）の登録】ここに書いたファイルだけがアプリ内にパックされて利用可能になります
  assets:
    - assets/json/country_master.json # 国の基本情報が載った親玉のJSONファイル
    - assets/json/rankings/             # 人口・面積・GDPなどのランキング情報が入ったフォルダ丸ごと登録
    - assets/json/wikipedia/            # Wikipediaの解説文データが入ったフォルダ丸ごと登録
    - assets/json/restcountries/        # 各国の詳細な国際データが入ったフォルダ丸ごと登録
    - assets/flags/                     # 各国の国旗SVG画像が入ったフォルダ丸ごと登録
    - assets/logo.svg                   # ホーム画面などで薄く表示させるアプリアイコン（SVG形式）